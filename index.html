<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive DSA Pattern Explorer</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <meta name="description" content="Interactive Data Structures and Algorithms Pattern Explorer for coding interviews">
</head>
<body class="bg-slate-50 text-slate-800">
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-sky-600">DSA Pattern Explorer</h1>
            <div class="relative w-full max-w-md mx-6">
                <input type="text" id="search-bar" placeholder="Search patterns, problems, topics..." 
                    class="w-full p-2 pl-4 pr-10 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 absolute right-3 top-3 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>
            <button id="menu-toggle" class="md:hidden block text-gray-500 hover:text-gray-700" aria-label="Toggle navigation menu">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex">
        <!-- Sidebar Navigation -->
        <aside id="sidebar" class="w-64 mr-8 hidden md:block md:sticky top-20 h-[calc(100vh-5rem)] overflow-y-auto bg-white p-4 rounded-lg shadow-sm">
            <nav id="sidebar-nav" class="space-y-2">
                <!-- Will be filled by JavaScript -->
            </nav>
        </aside>

        <!-- Main Content -->
        <main id="content" class="w-full md:ml-64 md:pl-8">
            <div id="content-sections" class="space-y-12">
                <!-- Will be filled by JavaScript -->
            </div>
        </main>
    </div>

    <footer class="py-6 bg-white border-t border-slate-200 mt-16">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-slate-600">© 2025 Interactive DSA Pattern Explorer - For mastering coding interviews</p>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
